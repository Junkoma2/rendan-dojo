<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>連打道場</title>
  <meta name="description" content="10秒間に何回タップできるか。連打力を鍛える。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <p class="kicker">RENDA DOJO</p>
      <h1>連打道場</h1>
    </header>

    <main>
      <div id="screen-ready" class="screen">
        <p class="description">10秒間に何回タップできるか。</p>
        <p class="best-label">最高記録: <strong id="best-score">0</strong> 回</p>
        <button id="start-btn" class="tap-btn" type="button">
          <span>タップしてスタート</span>
        </button>
      </div>

      <div id="screen-countdown" class="screen" hidden>
        <div class="countdown-wrap">
          <div class="countdown-ring" id="countdown-ring"></div>
          <span id="countdown-num" class="countdown-num">3</span>
        </div>
      </div>

      <div id="screen-play" class="screen" hidden>
        <div class="hud">
          <div class="hud-item">
            <span class="hud-label">カウント</span>
            <strong id="count" class="hud-value" aria-live="polite" aria-atomic="true">0</strong>
          </div>
          <div class="hud-item">
            <span class="hud-label">残り時間</span>
            <strong id="timer" class="hud-value" role="timer" aria-live="off">10</strong>
          </div>
        </div>
        <button id="tap-btn" class="tap-btn is-active" type="button">
          <span>連打！</span>
        </button>
      </div>

      <div id="screen-result" class="screen" hidden>
        <p id="result-reaction" class="result-reaction" tabindex="-1"></p>
        <div class="result-score">
          <strong id="result-count"></strong>
          <span>回 / 10秒</span>
        </div>
        <p id="result-cps" class="result-cps"></p>
        <p id="result-best" class="result-best"></p>
        <button id="retry-btn" class="retry-btn" type="button">もう一度</button>
      </div>
    </main>

    <footer>
      <a href="https://nonsensicalnook.com/" target="_blank" rel="noreferrer">NNook</a>
      <span id="app-version" class="app-version"></span>
    </footer>
  </div>

  <script src="app.js"></script>
  <script src="version.js"></script>
</body>
</html>
